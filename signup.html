<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Start your 14-day trial · Miss Floss</title>
  <meta name="description" content="Sign your dental clinic up for a 14-day Miss Floss trial. Live in 7 days.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0A1828;color:#E8F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:540px;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(15,118,110,0.4);border-radius:20px;padding:48px;text-align:center}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#5EEAD4;margin-bottom:20px}
    .eyebrow::before{content:'///';color:#0F766E;margin-right:8px;font-weight:700}
    h1{font-family:'Instrument Serif',serif;font-size:2.4rem;line-height:1.1;font-weight:400;margin-bottom:16px}
    h1 em{font-style:italic;color:#5EEAD4}
    p{color:rgba(232,244,248,0.65);line-height:1.6;margin-bottom:28px}
    form{display:grid;gap:14px;text-align:left}
    label{display:block;font-size:0.8rem;font-weight:600;color:#5EEAD4;margin-bottom:6px;letter-spacing:0.06em;text-transform:uppercase}
    input,select{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);color:#E8F4F8;font:inherit;font-size:0.95rem}
    input:focus,select:focus{outline:none;border-color:#0F766E;background:rgba(255,255,255,0.07)}
    button{padding:16px 28px;border:none;border-radius:12px;background:#0F766E;color:#fff;font:inherit;font-weight:600;font-size:0.95rem;cursor:pointer;transition:background 0.2s,box-shadow 0.2s;margin-top:8px}
    button:hover{background:#14B8A6;box-shadow:0 0 24px rgba(15,118,110,0.3)}
    .foot{margin-top:24px;font-size:0.8rem;color:rgba(232,244,248,0.45)}
    .foot a{color:#5EEAD4;text-decoration:underline}
    .back{position:absolute;top:24px;left:24px;font-size:0.85rem;color:rgba(232,244,248,0.5);text-decoration:none}
    .back:hover{color:#5EEAD4}
  </style>
</head>
<body>
  <a class="back" href="/">← Back</a>
  <div class="card">
    <div class="eyebrow">14-day trial</div>
    <h1>Live in 7 days. <em>No credit card today.</em></h1>
    <p>Tell us about your clinic and a Miss Floss specialist will be in touch within one business day with a setup call and a fixed-scope plan.</p>
    <form onsubmit="event.preventDefault();window.location.href='mailto:hello@missfloss.ai?subject=Trial%20signup%20-%20'+encodeURIComponent(document.getElementById('clinic').value)+'&body='+encodeURIComponent('Clinic: '+document.getElementById('clinic').value+'%0AContact: '+document.getElementById('name').value+'%0AEmail: '+document.getElementById('email').value+'%0APhone: '+document.getElementById('phone').value+'%0AProvince: '+document.getElementById('province').value+'%0APMS: '+document.getElementById('pms').value+'%0AChairs: '+document.getElementById('chairs').value)">
      <div>
        <label for="clinic">Clinic name</label>
        <input id="clinic" required placeholder="e.g. Brampton Family Dental">
      </div>
      <div>
        <label for="name">Your name</label>
        <input id="name" required placeholder="Dr. or Office Manager">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" required>
        </div>
        <div>
          <label for="phone">Clinic phone</label>
          <input id="phone" type="tel" required>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <label for="province">Province</label>
          <select id="province" required>
            <option value="">Select</option>
            <option>ON</option><option>QC</option><option>BC</option><option>AB</option>
            <option>MB</option><option>SK</option><option>NS</option><option>NB</option>
            <option>NL</option><option>PE</option><option>YT</option><option>NT</option><option>NU</option>
          </select>
        </div>
        <div>
          <label for="chairs">Chairs</label>
          <select id="chairs" required>
            <option value="">Select</option>
            <option>1-3</option><option>4-6</option><option>7-10</option><option>11+</option>
          </select>
        </div>
      </div>
      <div>
        <label for="pms">Practice management software</label>
        <select id="pms">
          <option>Dentrix Ascend</option>
          <option>Dentrix Classic</option>
          <option>AbleDent</option>
          <option>ClearDent</option>
          <option>TraknetIQ</option>
          <option>Open Dental</option>
          <option>Other / not sure</option>
        </select>
      </div>
      <button type="submit">Request my setup call</button>
    </form>
    <p class="foot">By signing up you agree to our <a href="/terms">terms</a> and <a href="/privacy">privacy policy</a>. PHIPA &amp; PIPEDA compliant.</p>
  </div>
</body>
</html>
